################################
# MATRIX × CYBERPUNK — FINAL
################################

# Font
font_family      FiraCode Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        18.0
enable_ligatures yes

################################
# CURSOR — MATRIX
################################

cursor_shape block
cursor_blink on
cursor_blink_interval 0.6
cursor #00ff41
cursor_text_color #000000

################################
# WINDOW
################################

initial_window_width  90c
initial_window_height 30c
background_opacity 0.72
#background_opacity 1
hide_window_decorations yes
rounded_corners yes

################################
# SCROLLBACK
################################

scrollback_lines 10000
scrollback_pager history

################################
# MOUSE & CLIPBOARD
################################

copy_on_select yes
map ctrl+shift+c copy_to_clipboard
map ctrl+shift+v paste_from_clipboard

################################
# BELL
################################

enable_audio_bell yes
visual_bell_duration 0
# marcar la pestana/ventana y el dock cuando llega el bell (p.ej. Claude en tmux)
window_alert_on_bell yes
bell_on_tab "🔔 "

################################
# MATRIX × CYBERPUNK — MATRIX GREEN
################################

background #020403
#foreground #00ff41
foreground #00e63f


selection_background #003b1f
selection_foreground #00ff41

################################
# ANSI COLORS
################################

# Black
color0  #020403
color8  #003b1f

# Red — errors
color1  #ff0055
color9  #ff4d88

# Green — MATRIX CORE
color2  #00ff41
color10 #66ff99

# Yellow — still greenish
color3  #66ff99
color11 #99ffbb

# Blue — cyberpunk hint
color4  #00b3ff
color12 #5fd3ff

# Magenta — accent only
color5  #ff00ff
color13 #ff66ff

# Cyan — UI / links
color6  #00fff0
color14 #5ffff7

# White
color7  #b9ffcc
color15 #eafff2

################################
# TAB BAR — MATRIX DOMINANT
################################

active_tab_background   #020403
active_tab_foreground   #00ff41
inactive_tab_background #001a0d
inactive_tab_foreground #007f3f

################################
# URLS
################################

open_url_with default
detect_urls yes
